<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit OS - Lock Screen</title>
    <style>
        /* Base styling with a subtle cosmic gradient */
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0b0f19 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ffffff;
            overflow: hidden;
            /* For the smooth transition to login */
            transition: opacity 0.5s ease;
        }

        /* Clock and Date Container */
        .datetime-container {
            margin-top: 15vh;
            text-align: center;
            user-select: none;
        }

        .time {
            font-size: 7rem;
            font-weight: 200;
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .date {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: -15px;
            letter-spacing: 1px;
        }

        /* Unlock Interaction Area */
        .unlock-area {
            margin-bottom: 10vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .unlock-area:hover {
            opacity: 1;
            transform: translateY(-5px);
        }

        .unlock-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
            /* Subtle floating animation to hint at interaction */
            animation: bounce 2.5s infinite;
        }

        .unlock-text {
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Keyframes */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        /* Triggered by JS before navigation */
        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="datetime-container">
        <h1 class="time" id="timeDisplay">00:00</h1>
        <p class="date" id="dateDisplay">Loading date...</p>
    </div>

    <div class="unlock-area" id="unlockBtn">
        <div class="unlock-icon">↑</div>
        <div class="unlock-text">Click or Swipe up to unlock</div>
    </div>

    <script>
        // DOM Elements
        const timeDisplay = document.getElementById('timeDisplay');
        const dateDisplay = document.getElementById('dateDisplay');
        const unlockBtn = document.getElementById('unlockBtn');

        // Function to update the clock and date
        function updateDateTime() {
            const now = new Date();
            
            // Format Time (e.g., 14:05 or 02:05)
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}`;

            // Format Date (e.g., Thursday, April 2)
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dateDisplay.textContent = now.toLocaleDateString(undefined, options);
        }

        // Initialize immediately, then update every second
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Handle Unlock Interaction
        unlockBtn.addEventListener('click', () => {
            // Add the fade-out class to the body
            document.body.classList.add('fade-out');
            
            // Wait for the 500ms CSS transition to finish, then navigate
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 500);
        });

        // Optional: Add a simple swipe-up listener for touch devices
        let touchStartY = 0;
        let touchEndY = 0;

        document.addEventListener('touchstart', e => {
            touchStartY = e.changedTouches[0].screenY;
        });

        document.addEventListener('touchend', e => {
            touchEndY = e.changedTouches[0].screenY;
            // If swiped up by more than 50px, trigger unlock
            if (touchStartY - touchEndY > 50) {
                unlockBtn.click();
            }
        });
    </script>
</body>
</html>
