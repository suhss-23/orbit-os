<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit OS - Lock Screen</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/aurora.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
            color: #ffffff;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        .datetime-container {
            margin-top: 15vh;
            text-align: center;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        .time {
            font-size: 7rem;
            font-weight: 200;
            letter-spacing: 4px;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .date {
            font-size: 1.5rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: -15px;
            letter-spacing: 1px;
        }

        .unlock-area {
            margin-bottom: 10vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.3s ease, transform 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .unlock-area:hover {
            opacity: 1;
            transform: translateY(-5px);
        }

        .unlock-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            font-size: 1.2rem;
            animation: bounce 2.5s infinite;
        }

        .unlock-text {
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40%  { transform: translateY(-10px); }
            60%  { transform: translateY(-5px); }
        }

        .fade-out {
            opacity: 0;
        }
    </style>
</head>
<body data-theme="blue">

    <div class="aurora-bg"></div>

    <div class="datetime-container">
        <h1 class="time" id="timeDisplay">00:00</h1>
        <p class="date" id="dateDisplay">Loading date...</p>
    </div>

    <div class="unlock-area" id="unlockBtn">
        <div class="unlock-icon">↑</div>
        <div class="unlock-text">Click or Swipe up to unlock</div>
    </div>

    <script>
        // Load saved theme
        const savedTheme = localStorage.getItem('orbit-theme') || 'blue';
        document.body.setAttribute('data-theme', savedTheme);

        // Live clock
        function updateDateTime() {
            const now = new Date();
            const hours   = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString(undefined, options);
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Unlock on click
        document.getElementById('unlockBtn').addEventListener('click', () => {
            document.body.classList.add('fade-out');
            setTimeout(() => { window.location.href = 'login.html'; }, 500);
        });

        // Swipe up on touch devices
        let touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; });
        document.addEventListener('touchend', e => {
            if (touchStartY - e.changedTouches[0].screenY > 50) {
                document.getElementById('unlockBtn').click();
            }
        });
    </script>
</body>
</html>
